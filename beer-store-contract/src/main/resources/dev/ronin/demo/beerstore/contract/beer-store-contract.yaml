openapi: 3.0.1
info:
  title: beer-store-application API
  description: OpenAPI definition
  version: 1.0.0
servers:
  - url: 'http://localhost:8080'
    description: Generated server url
paths:
  /orders:
    get:
      tags:
        - order
      operationId: getOrders
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
    post:
      tags:
        - order
      operationId: createOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: integer
                format: int64
  /orders/{id}:
    get:
      tags:
        - order
      operationId: getOrderById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
    put:
      tags:
        - order
      operationId: updateOrderStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
    delete:
      tags:
        - order
      operationId: cancelOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: NO CONTENT
  /customers:
    get:
      tags:
        - customer
      operationId: getCustomers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
    post:
      tags:
        - customer
      operationId: createCustomer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Customer'
        required: true
      responses:
        '201':
          description: CREATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
  /customers/search:
    get:
      tags:
        - customer
      operationId: getCustomerByName
      parameters:
        - schema:
            type: string
          in: query
          name: name
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
    parameters: []
  '/customers/{id}':
    get:
      tags:
        - customer
      operationId: getCustomerById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
    put:
      tags:
        - customer
      operationId: updateCustomer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Customer'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
    delete:
      tags:
        - customer
      operationId: deleteCustomer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: NO CONTENT
  /:
    get:
      tags:
        - home
      description: Returns a simple "Hello!"
      operationId: hello
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
components:
  schemas:
    Order:
      required:
        - beers
        - customerId
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        customerId:
          type: integer
          format: int64
        beers:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64
        status:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/OrderStatus'
    OrderStatus:
      type: string
      enum:
        - NEW
        - PROCESSING
        - SHIPPED
        - DELIVERED
        - CANCELLED
    OrderStatusUpdateRequest:
      required:
        - status
      type: object
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'
    Address:
      required:
        - city
        - country
        - streetAddress
        - zip
      type: object
      properties:
        country:
          type: string
        city:
          type: string
        streetAddress:
          type: string
        zip:
          type: string
    Customer:
      required:
        - address
        - firstName
        - lastName
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        firstName:
          type: string
        lastName:
          type: string
        address:
          $ref: '#/components/schemas/Address'
