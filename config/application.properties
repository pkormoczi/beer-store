## Overrides applied on top of the bundled application.yml when this directory is mounted into a
## running container at /workspace/config (see README.md, "Building & running a container image").
## Points the packaged app at a Postgres instance reachable from inside the container - matches
## the Postgres block already commented out in beer-store-application/src/main/resources/application.yml.
spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=user
spring.datasource.password=password
spring.liquibase.enabled=true
spring.jpa.hibernate.ddl-auto=validate
