name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build & install beer-store-contract
        run: ./mvnw -pl beer-store-contract clean install

      - name: Build full reactor (skip tests)
        run: ./mvnw -Dmaven.test.skip=true clean install

      - name: Tests (Surefire + Failsafe) with coverage
        run: ./mvnw -pl beer-store-application org.jacoco:jacoco-maven-plugin:prepare-agent verify

      - name: Upload test result reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          retention-days: 14
          if-no-files-found: ignore

      - name: Jacoco coverage report
        run: ./mvnw -pl beer-store-application org.jacoco:jacoco-maven-plugin:report

      - name: Upload jacoco coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: beer-store-application/target/site/jacoco/**
          retention-days: 14
          if-no-files-found: ignore

      - name: Generate Allure report
        if: always()
        uses: simple-elf/allure-report-action@v1.14
        with:
          allure_results: beer-store-application/target/allure-results
          allure_report: allure-report

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 14
          if-no-files-found: ignore

      - name: SonarCloud analysis
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build container image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: >
          ./mvnw -pl beer-store-application spring-boot:build-image
          -Dmaven.test.skip=true
          -Dspring-boot.build-image.imageName=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/beer-store:${{ github.sha }}

      - name: Scan image with Trivy
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_SKIP_VERSION_CHECK: true
        with:
          image-ref: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/beer-store:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: json
          output: trivy-report.json

      - name: Render Trivy HTML report
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        continue-on-error: true
        run: |
          if [ -f trivy-report.json ]; then
            python3 .github/scripts/render_trivy_report.py trivy-report.json trivy-report.html
          fi

      - name: Upload Trivy report artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.html
          retention-days: 14
          if-no-files-found: ignore

      - name: Assemble GitHub Pages site
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        continue-on-error: true
        run: |
          mkdir -p pages-site/allure pages-site/trivy
          cp -r allure-report/. pages-site/allure/
          if [ -f trivy-report.html ]; then
            cp trivy-report.html pages-site/trivy/index.html
          fi
          cp .github/pages/index.html pages-site/index.html

      - name: Package reports for GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        continue-on-error: true
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-site

      - name: Deploy reports to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Push container image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/beer-store:${{ github.sha }}
          docker tag docker.io/${{ secrets.DOCKERHUB_USERNAME }}/beer-store:${{ github.sha }} docker.io/${{ secrets.DOCKERHUB_USERNAME }}/beer-store:latest
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/beer-store:latest
